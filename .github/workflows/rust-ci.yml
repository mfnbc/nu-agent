name: Rust CI

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          profile: minimal
      - name: Cargo test shredder
        working-directory: ./shredder
        run: cargo test --locked
      - name: Cargo test nu_plugin_rag
        working-directory: ./crates/nu_plugin_rag
        run: cargo test --locked
