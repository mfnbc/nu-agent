name: Rust CI

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          profile: minimal
      - name: Run cargo test (workspace)
        run: cargo test --workspace --locked

      - name: Install Nushell (for script-based integration test)
        run: |
          cargo install nu-cli --locked

      - name: Run scripts/test-pipeline.nu
        run: |
          nu --no-config-file scripts/test-pipeline.nu
