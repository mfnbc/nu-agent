[package]
name = "nu_plugin_rag"
version = "0.1.0"
edition = "2021"

[dependencies]
anyhow = "1"
blake3 = "1"
clap = { version = "4", features = ["derive"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tempfile = "3"
which = "4"
dirs = "5"
reqwest = { version = "0.11", features = ["blocking", "rustls-tls"] }
tract-onnx = "0.17"
tract-core = "0.17"
tokenizers = "0.14"
ndarray = "0.15"
chrono = { version = "0.4", features = ["serde"] }
nu_agent_common = { path = "../nu_agent_common" }

[lib]
name = "nu_plugin_rag"
path = "src/lib.rs"

[[bin]]
name = "embed_runner"
path = "src/bin/embed_runner.rs"
